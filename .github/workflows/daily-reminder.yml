name: 运动打卡提醒

on:
  # 定时任务已改用 cron-job.org 外部触发（更可靠）
  # 保留手动触发用于测试
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai  # 让 datetime.now() 返回北京时间
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送打卡提醒
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          CHECKIN_URL: ${{ secrets.CHECKIN_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/send_reminder.py
