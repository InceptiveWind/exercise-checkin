name: 运动打卡提醒

on:
  # 2026 新特性：直接在 cron 里指定时区，每天北京时间 20:40 执行
  # 选 20:40 避开整点高峰，GitHub 调度更稳定
  schedule:
    - cron: '40 20 * * *'
      timezone: 'Asia/Shanghai'
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai  # 让 datetime.now() 返回北京时间
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送打卡提醒
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          CHECKIN_URL: ${{ secrets.CHECKIN_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/send_reminder.py
