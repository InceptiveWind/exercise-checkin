name: 运动打卡提醒

on:
  # 每天北京时间 20:00（UTC 12:00）触发
  schedule:
    - cron: '0 12 * * *'
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai  # 让 datetime.now() 返回北京时间
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送打卡提醒
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          CHECKIN_URL: ${{ secrets.CHECKIN_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/send_reminder.py
