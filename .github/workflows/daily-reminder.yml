name: 运动打卡提醒

on:
  # 每小时触发一次（UTC 0 分）
  # GitHub 的 schedule 经常延迟/跳过，所以用每小时跑 + 时间窗口判断
  # 北京时间 20:00-22:59 之间执行发送逻辑，其它时间直接跳过
  schedule:
    - cron: '0 * * * *'
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai  # 让 datetime.now() 返回北京时间
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 发送打卡提醒
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          CHECKIN_URL: ${{ secrets.CHECKIN_URL }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/send_reminder.py
