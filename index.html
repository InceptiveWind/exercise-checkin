<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>刘峰的运动打卡</title>
  <style>
    /* ====== CSS 变量（暗色模式切换）====== */
    :root {
      --bg-start: #e8f5e9;
      --bg-end: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f5f5f5;
      --bg-overlay: rgba(0, 0, 0, 0.5);
      --bg-input: #ffffff;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --text-inverse: #ffffff;
      --border: #e0e0e0;
      --border-light: #f0f0f0;
      --accent: #4CAF50;
      --accent-dark: #388E3C;
      --status-done-bg: #e8f5e9;
      --status-done-text: #2e7d32;
      --status-pending-bg: #fff3e0;
      --status-pending-text: #e65100;
      --status-error-bg: #ffebee;
      --status-error-text: #c62828;
      --shadow-sm: rgba(0, 0, 0, 0.06);
      --shadow-md: rgba(0, 0, 0, 0.08);
      --calendar-today: #ff9800;
      --calendar-record-bg: #c8e6c9;
      --calendar-record-today-bg: #fff3e0;
    }
    :root.dark {
      --bg-start: #1a1a1a;
      --bg-end: #0d0d0d;
      --bg-card: #2a2a2a;
      --bg-card-hover: #353535;
      --bg-overlay: rgba(0, 0, 0, 0.7);
      --bg-input: #1f1f1f;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-tertiary: #808080;
      --text-inverse: #1a1a1a;
      --border: #404040;
      --border-light: #2a2a2a;
      --accent: #66bb6a;
      --accent-dark: #81c784;
      --status-done-bg: #1e3a1e;
      --status-done-text: #81c784;
      --status-pending-bg: #3e2a1a;
      --status-pending-text: #ffb74d;
      --status-error-bg: #3e1a1a;
      --status-error-text: #ef5350;
      --shadow-sm: rgba(0, 0, 0, 0.3);
      --shadow-md: rgba(0, 0, 0, 0.4);
      --calendar-today: #ffa726;
      --calendar-record-bg: #2e4a2e;
      --calendar-record-today-bg: #4a3a1e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 60%);
      min-height: 100vh;
      padding: 16px 14px 40px;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 480px; margin: 0 auto; }

    /* ====== 密码页 ====== */
    .auth-screen {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .auth-screen h1 { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
    .auth-screen .hint { color: var(--text-tertiary); font-size: 14px; margin-bottom: 28px; }
    .auth-input {
      width: 100%; max-width: 280px; border: 2px solid var(--border);
      border-radius: 10px; padding: 14px 16px; font-size: 16px;
      text-align: center; letter-spacing: 4px; font-family: inherit;
      margin-bottom: 12px; background: var(--bg-input); color: var(--text-primary);
      -webkit-appearance: none; appearance: none;
    }
    .auth-input:focus { outline: none; border-color: var(--accent); }
    .auth-btn {
      width: 100%; max-width: 280px; background: var(--accent); color: var(--text-inverse);
      border: none; border-radius: 10px; padding: 14px; font-size: 16px;
      font-weight: bold; cursor: pointer; font-family: inherit;
    }
    .auth-btn:active { background: var(--accent-dark); }
    .auth-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }
    .auth-error { color: var(--status-error-text); font-size: 14px; margin-top: 12px; min-height: 20px; }

    /* ====== 主页面 ====== */
    .main-screen { display: none; }
    .main-screen.active { display: block; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding: 4px 0;
    }
    .header h1 { font-size: 22px; color: var(--accent); }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); border-radius: 8px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .icon-btn:active { background: var(--bg-card-hover); }

    /* ====== 统计卡 ====== */
    .stats-card {
      background: var(--bg-card); border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 2px 8px var(--shadow-sm); margin-bottom: 14px;
    }
    .stats-row { display: flex; gap: 12px; margin-bottom: 10px; }
    .stat-box { flex: 1; text-align: center; }
    .stat-num { font-size: 24px; font-weight: bold; color: var(--accent); line-height: 1.1; }
    .stat-label { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
    .month-types { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border-light); }
    .type-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg-card-hover); border-radius: 12px;
      padding: 4px 10px; font-size: 13px; color: var(--text-secondary);
    }
    .type-pill strong { color: var(--text-primary); font-weight: 600; }

    /* ====== 月历 ====== */
    .calendar-card {
      background: var(--bg-card); border-radius: 14px; padding: 14px;
      box-shadow: 0 2px 8px var(--shadow-sm); margin-bottom: 14px;
    }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
    .cal-nav {
      background: transparent; border: none; color: var(--text-secondary);
      font-size: 18px; padding: 4px 10px; cursor: pointer; font-family: inherit;
    }
    .cal-nav:active { color: var(--accent); }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; margin-bottom: 6px;
    }
    .cal-weekday {
      text-align: center; font-size: 11px; color: var(--text-tertiary);
      padding: 4px 0; font-weight: 500;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: transparent; border: 1px solid transparent;
      cursor: pointer; font-family: inherit; color: var(--text-primary);
      position: relative; padding: 2px;
      transition: background 0.1s;
    }
    .cal-day:active { background: var(--bg-card-hover); }
    .cal-day.empty { cursor: default; }
    .cal-day.empty:active { background: transparent; }
    .cal-day.future {
      opacity: 0.32;
      pointer-events: none;
      cursor: not-allowed;
    }
    .cal-day.future .day-num { font-weight: 400; }
    .cal-day .day-num { font-size: 13px; line-height: 1; }
    .cal-day.has-record .day-num { font-weight: 600; }
    .cal-day.has-record { background: var(--calendar-record-bg); }
    .cal-day.is-today { border-color: var(--calendar-today); }
    .cal-day.is-today.has-record { background: var(--calendar-record-today-bg); }
    .cal-day .day-icons {
      display: flex; gap: 1px; margin-top: 2px; font-size: 8px; line-height: 1;
    }
    .cal-day .backfill-mark {
      position: absolute; top: 1px; right: 2px;
      font-size: 8px; color: var(--text-tertiary); line-height: 1;
    }

    /* ====== 今日打卡（固定按钮）====== */
    .quick-add {
      background: var(--accent); color: var(--text-inverse);
      border: none; border-radius: 14px; padding: 14px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      width: 100%; box-shadow: 0 2px 8px var(--shadow-md);
      font-family: inherit; transition: transform 0.1s, background 0.1s;
    }
    .quick-add:active { transform: scale(0.98); background: var(--accent-dark); }

    .today-status {
      background: var(--bg-card); border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 2px 8px var(--shadow-sm); margin-bottom: 14px;
    }
    .today-status.has-record { border-left: 4px solid var(--accent); }
    .today-status-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .today-status-title .label { font-size: 14px; color: var(--text-secondary); }
    .today-status-title .time { font-size: 12px; color: var(--text-tertiary); }
    .today-status .types {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
    }
    .type-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--accent); color: var(--text-inverse);
      border-radius: 10px; padding: 3px 9px; font-size: 12px;
    }
    .today-status .note { color: var(--text-secondary); font-size: 14px; line-height: 1.4; }
    .today-status .actions { margin-top: 10px; display: flex; gap: 8px; }
    .small-btn {
      flex: 1; padding: 8px; font-size: 13px; border-radius: 8px;
      cursor: pointer; font-family: inherit; transition: all 0.1s;
    }
    .small-btn.primary { background: var(--accent); color: var(--text-inverse); border: none; }
    .small-btn.secondary {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .small-btn:active { opacity: 0.7; }

    /* ====== 弹窗 ====== */
    .modal-backdrop {
      position: fixed; inset: 0; background: var(--bg-overlay);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 100; backdrop-filter: blur(2px);
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      background: var(--bg-card); width: 100%; max-width: 480px;
      border-radius: 16px 16px 0 0; padding: 20px 18px 28px;
      max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title {
      font-size: 18px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 4px;
    }
    .modal-subtitle { font-size: 13px; color: var(--text-tertiary); margin-bottom: 16px; }
    .form-label {
      font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;
      display: block; font-weight: 500;
    }
    .type-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 18px;
    }
    .type-chip {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 14px 12px; border-radius: 10px;
      border: 2px solid var(--border); background: var(--bg-input);
      color: var(--text-secondary); font-size: 15px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .type-chip:active { transform: scale(0.97); }
    .type-chip.selected {
      background: var(--accent); color: var(--text-inverse);
      border-color: var(--accent);
    }
    .type-chip .emoji { font-size: 18px; }
    .modal-input {
      width: 100%; border: 2px solid var(--border);
      border-radius: 10px; padding: 12px 14px; font-size: 15px;
      font-family: inherit; resize: vertical; min-height: 80px;
      background: var(--bg-input); color: var(--text-primary);
      -webkit-appearance: none; appearance: none; margin-bottom: 18px;
    }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1; padding: 14px; font-size: 15px; font-weight: 600;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      transition: all 0.1s;
    }
    .modal-btn.primary { background: var(--accent); color: var(--text-inverse); border: none; }
    .modal-btn.primary:active { background: var(--accent-dark); }
    .modal-btn.danger { background: #f44336; color: white; border: none; }
    .modal-btn.danger:active { background: #d32f2f; }
    .modal-btn.secondary {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-error {
      color: var(--status-error-text); font-size: 13px;
      margin-bottom: 10px; min-height: 18px;
    }

    .empty { text-align: center; color: var(--text-tertiary); padding: 20px; font-size: 14px; }
    .footer { text-align: center; color: var(--text-tertiary); font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- 密码页 -->
    <div id="authScreen" class="auth-screen">
      <h1>🏃 刘峰的运动打卡</h1>
      <div class="hint">请输入密码</div>
      <input type="password" id="passwordInput" class="auth-input"
             placeholder="••••" autocomplete="off" maxlength="50">
      <button id="loginBtn" class="auth-btn">进入</button>
      <div id="authError" class="auth-error"></div>
    </div>

    <!-- 主页面 -->
    <div id="mainScreen" class="main-screen">
      <div class="header">
        <h1>🏃 刘峰的运动打卡</h1>
        <div class="header-actions">
          <button id="darkToggle" class="icon-btn" title="暗色模式">🌙</button>
          <button id="logoutBtn" class="icon-btn" title="退出">退出</button>
        </div>
      </div>

      <!-- 统计卡 -->
      <div class="stats-card">
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="streak">-</div>
            <div class="stat-label">🔥 连续天数</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="total">-</div>
            <div class="stat-label">📅 累计天数</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="monthTotal">-</div>
            <div class="stat-label">📆 本月次数</div>
          </div>
        </div>
        <div class="month-types" id="monthTypes"></div>
      </div>

      <!-- 今日状态 -->
      <div id="todayStatus" class="today-status">
        <div class="empty" id="todayStatusText">今日还未打卡</div>
      </div>

      <!-- 月历 -->
      <div class="calendar-card">
        <div class="cal-header">
          <button class="cal-nav" id="prevMonth">‹</button>
          <div class="cal-title" id="calTitle">2026年6月</div>
          <button class="cal-nav" id="nextMonth">›</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">日</div>
          <div class="cal-weekday">一</div>
          <div class="cal-weekday">二</div>
          <div class="cal-weekday">三</div>
          <div class="cal-weekday">四</div>
          <div class="cal-weekday">五</div>
          <div class="cal-weekday">六</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="footer">点击日历任意一天可补卡或编辑</div>
    </div>

  </div>

  <!-- 弹窗 -->
  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-title" id="modalTitle">打卡</div>
      <div class="modal-subtitle" id="modalSubtitle"></div>

      <label class="form-label">运动类型（可多选）</label>
      <div class="type-grid" id="typeGrid"></div>

      <label class="form-label">备注（可选）</label>
      <textarea id="noteInput" class="modal-input" maxlength="200"
                placeholder="今天做了什么？比如：上午深蹲 5 组，下午跑步 30 分钟"></textarea>

      <div class="modal-error" id="modalError"></div>

      <div class="modal-actions">
        <button class="modal-btn secondary" id="modalCancel">取消</button>
        <button class="modal-btn primary" id="modalSave">保存</button>
      </div>
      <div class="modal-actions" id="deleteRow" style="margin-top: 8px; display: none;">
        <button class="modal-btn danger" id="modalDelete" style="width: 100%;">删除这条打卡</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';
    const TOKEN_KEY = 'exercise_token';
    const DARK_KEY = 'darkMode';

    const TYPE_INFO = {
      '力量': { emoji: '💪', label: '力量' },
      '有氧': { emoji: '🏃', label: '有氧' },
      '阻抗': { emoji: '🏋️', label: '阻抗' },
      '日常': { emoji: '🚶', label: '日常' },
    };

    let allRecords = [];
    let allowedTypes = ['力量', '有氧', '阻抗', '日常'];
    let currentYear, currentMonth;
    let modalDate = null;
    let modalSelectedTypes = [];

    // ============== 工具 ==============
    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function formatDate(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
    function todayStr() { return formatDate(new Date()); }
    function isToday(d) { return d === todayStr(); }
    function isFuture(date) { return date > todayStr(); }
    function isBackfill(date) { return !isToday(date) && allRecords.some(r => r.date === date); }
    function getTzOffset() { return -new Date().getTimezoneOffset(); }
    function findRecord(date) { return allRecords.find(r => r.date === date); }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    // ============== 暗色模式 ==============
    // 自动判定：19:00 - 06:59 为深色，07:00 - 18:59 为浅色
    function isTimeBasedDark() {
      const hour = new Date().getHours();
      return hour < 7 || hour >= 19;
    }
    function setDarkClass(isDark) {
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
    }
    function getEffectiveMode() {
      const saved = localStorage.getItem(DARK_KEY);
      if (saved === '1') return true;
      if (saved === '0') return false;
      return isTimeBasedDark();
    }
    function initDark() {
      setDarkClass(getEffectiveMode());
      // 跨时间边界时自动切换（仅当用户没手动设过偏好）
      setInterval(() => {
        if (localStorage.getItem(DARK_KEY) === null) {
          setDarkClass(isTimeBasedDark());
        }
      }, 60_000);  // 每分钟检查一次
    }
    document.getElementById('darkToggle').addEventListener('click', () => {
      const newMode = !document.documentElement.classList.contains('dark');
      setDarkClass(newMode);
      // 手动切换 = 写 localStorage，后续不再被自动模式覆盖
      localStorage.setItem(DARK_KEY, newMode ? '1' : '0');
    });

    // ============== 页面切换 ==============
    function showAuth() {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('mainScreen').classList.remove('active');
    }
    function showMain() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('mainScreen').classList.add('active');
    }

    // ============== API ==============
    async function api(path, options = {}) {
      const token = getToken();
      const headers = options.headers ? { ...options.headers } : {};
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const resp = await fetch(API_URL + path, { ...options, headers, cache: 'no-store' });
      if (resp.status === 401) {
        clearToken(); showAuth();
        throw new Error('登录已过期');
      }
      return resp;
    }

    async function loadData() {
      try {
        const resp = await api('/api/records');
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || '加载失败');
        allRecords = data.records || [];
        if (Array.isArray(data.allowedTypes)) allowedTypes = data.allowedTypes;
        renderAll();
      } catch (e) {
        console.error('loadData:', e);
      }
    }

    // ============== 统计 ==============
    function calcStreak(records) {
      if (!records.length) return 0;
      const dates = [...new Set(records.map(r => r.date))].sort().reverse();
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let streak = 0, expected = new Date(today);
      if (dates[0] !== formatDate(today)) expected.setDate(expected.getDate() - 1);
      for (const d of dates) {
        if (d === formatDate(expected)) {
          streak++;
          expected.setDate(expected.getDate() - 1);
        } else break;
      }
      return streak;
    }

    function renderStats() {
      document.getElementById('streak').textContent = calcStreak(allRecords);
      document.getElementById('total').textContent = new Set(allRecords.map(r => r.date)).size;

      // 本月统计
      const monthRecs = allRecords.filter(r => {
        const d = new Date(r.date);
        return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
      });
      document.getElementById('monthTotal').textContent = monthRecs.length;

      // 按类型统计本月
      const typeCount = {};
      for (const r of monthRecs) {
        for (const t of (r.types || [])) {
          typeCount[t] = (typeCount[t] || 0) + 1;
        }
      }
      const typesEl = document.getElementById('monthTypes');
      if (Object.keys(typeCount).length === 0) {
        typesEl.innerHTML = '<div style="font-size: 12px; color: var(--text-tertiary);">本月还没有打卡</div>';
      } else {
        const sorted = Object.entries(typeCount).sort((a, b) => b[1] - a[1]);
        typesEl.innerHTML = sorted.map(([t, n]) =>
          `<span class="type-pill">${TYPE_INFO[t]?.emoji || ''} <strong>${n}</strong> ${TYPE_INFO[t]?.label || t}</span>`
        ).join('');
      }
    }

    // ============== 今日状态卡 ==============
    function renderTodayStatus() {
      const el = document.getElementById('todayStatus');
      const rec = findRecord(todayStr());
      if (!rec) {
        el.className = 'today-status';
        el.innerHTML = '<div class="empty">今日还未打卡</div>';
        return;
      }
      el.className = 'today-status has-record';
      const typeBadges = (rec.types || []).map(t =>
        `<span class="type-badge">${TYPE_INFO[t]?.emoji || ''} ${TYPE_INFO[t]?.label || t}</span>`
      ).join('');
      el.innerHTML = `
        <div class="today-status-title">
          <div class="label">✅ 今日已打卡</div>
          <div class="time">⏰ ${rec.time}</div>
        </div>
        <div class="types">${typeBadges}</div>
        ${rec.note ? `<div class="note">${escapeHtml(rec.note)}</div>` : ''}
        <div class="actions">
          <button class="small-btn primary" id="editTodayBtn">编辑</button>
          <button class="small-btn secondary" id="delTodayBtn">删除</button>
        </div>
      `;
      document.getElementById('editTodayBtn').addEventListener('click', () => openModal(todayStr()));
      document.getElementById('delTodayBtn').addEventListener('click', () => deleteDay(todayStr()));
    }

    // ============== 月历 ==============
    function renderCalendar() {
      document.getElementById('calTitle').textContent = `${currentYear}年${currentMonth}月`;

      const firstDay = new Date(currentYear, currentMonth - 1, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const recordsByDate = {};
      for (const r of allRecords) recordsByDate[r.date] = r;

      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${currentYear}-${pad2(currentMonth)}-${pad2(d)}`;
        cells.push({ day: d, date, rec: recordsByDate[date] || null });
      }
      while (cells.length % 7 !== 0) cells.push(null);

      const grid = document.getElementById('calGrid');
      grid.innerHTML = cells.map(cell => {
        if (!cell) return '<div class="cal-day empty"></div>';
        const classes = ['cal-day'];
        const isT = isToday(cell.date);
        if (cell.rec) classes.push('has-record');
        if (isT) classes.push('is-today');
        if (isFuture(cell.date)) classes.push('future');
        const backfillMark = (cell.rec && !isT) ? '<span class="backfill-mark">↺</span>' : '';
        const icons = cell.rec
          ? `<div class="day-icons">${(cell.rec.types || []).map(t => TYPE_INFO[t]?.emoji || '').join('')}</div>`
          : '';
        return `<button class="${classes.join(' ')}" data-date="${cell.date}">
          <span class="day-num">${cell.day}</span>${icons}${backfillMark}
        </button>`;
      }).join('');

      // 只给非未来日期绑定点击
      grid.querySelectorAll('.cal-day:not(.empty):not(.future)').forEach(btn => {
        btn.addEventListener('click', () => openModal(btn.dataset.date));
      });
    }

    function renderAll() {
      renderStats();
      renderTodayStatus();
      renderCalendar();
    }

    // ============== 弹窗 ==============
    function openModal(date) {
      modalDate = date;
      const rec = findRecord(date);
      const isT = isToday(date);
      const dateObj = new Date(date + 'T00:00:00');
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

      const title = rec
        ? (isT ? '编辑今日打卡' : `编辑 ${dateObj.getMonth() + 1}月${dateObj.getDate()}日 打卡`)
        : (isT ? '今日打卡' : `补卡 - ${dateObj.getMonth() + 1}月${dateObj.getDate()}日`);
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalSubtitle').textContent =
        isT ? '' : `补卡时间将记为 12:00（${weekdays[dateObj.getDay()]}）`;

      // 类型按钮
      modalSelectedTypes = rec ? [...rec.types] : [];
      renderTypeGrid();

      // 备注
      document.getElementById('noteInput').value = rec ? rec.note : '';
      document.getElementById('modalError').textContent = '';
      document.getElementById('modalSave').disabled = false;
      document.getElementById('modalSave').textContent = rec ? '保存修改' : '保存';

      // 删除按钮：仅当有记录时显示
      document.getElementById('deleteRow').style.display = rec ? 'flex' : 'none';

      document.getElementById('modalBackdrop').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('active');
      modalDate = null;
    }

    function renderTypeGrid() {
      const grid = document.getElementById('typeGrid');
      grid.innerHTML = allowedTypes.map(t => {
        const info = TYPE_INFO[t] || { emoji: '', label: t };
        const selected = modalSelectedTypes.includes(t);
        return `<button class="type-chip ${selected ? 'selected' : ''}" data-type="${t}">
          <span class="emoji">${info.emoji}</span>${info.label}
        </button>`;
      }).join('');
      grid.querySelectorAll('.type-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const t = btn.dataset.type;
          if (modalSelectedTypes.includes(t)) {
            modalSelectedTypes = modalSelectedTypes.filter(x => x !== t);
          } else {
            modalSelectedTypes.push(t);
          }
          renderTypeGrid();
        });
      });
    }

    async function saveModal() {
      const errEl = document.getElementById('modalError');
      const saveBtn = document.getElementById('modalSave');
      errEl.textContent = '';

      if (modalSelectedTypes.length === 0) {
        errEl.textContent = '请至少选择一个运动类型';
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const resp = await api('/api/records', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            date: modalDate,
            types: modalSelectedTypes,
            note: document.getElementById('noteInput').value.trim(),
            tzOffset: getTzOffset(),  // 让后端用用户时区判断"今天"
          }),
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || '保存失败');
        await loadData();
        closeModal();
      } catch (e) {
        errEl.textContent = '❌ ' + e.message;
        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
      }
    }

    async function deleteDay(date) {
      if (!confirm(`确定删除 ${date} 的打卡记录吗？此操作无法撤销。`)) return;
      try {
        const resp = await api(`/api/records?date=${encodeURIComponent(date)}`, { method: 'DELETE' });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || '删除失败');
        await loadData();
      } catch (e) {
        alert('❌ ' + e.message);
      }
    }

    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveModal);
    document.getElementById('modalDelete').addEventListener('click', () => {
      if (modalDate) deleteDay(modalDate).then(closeModal);
    });
    document.getElementById('modalBackdrop').addEventListener('click', e => {
      if (e.target === document.getElementById('modalBackdrop')) closeModal();
    });

    // ============== 登录 ==============
    async function doLogin() {
      const input = document.getElementById('passwordInput');
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('authError');
      const password = input.value;
      errEl.textContent = '';
      if (!password) { errEl.textContent = '请输入密码'; return; }
      btn.disabled = true; btn.textContent = '验证中...';
      try {
        const resp = await fetch(API_URL + '/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || '登录失败');
        setToken(data.token);
        input.value = '';
        showMain();
        initCurrentMonth();
        initDark();
        loadData();
        if (window._refreshTimer) clearInterval(window._refreshTimer);
        window._refreshTimer = setInterval(loadData, 60000);
      } catch (e) {
        errEl.textContent = '❌ ' + e.message;
      } finally {
        btn.disabled = false; btn.textContent = '进入';
      }
    }

    function doLogout() {
      if (!confirm('确定要退出登录吗？')) return;
      clearToken();
      if (window._refreshTimer) clearInterval(window._refreshTimer);
      showAuth();
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('logoutBtn').addEventListener('click', doLogout);

    // ============== 月份切换 ==============
    function initCurrentMonth() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth() + 1;
    }
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1) { currentMonth = 12; currentYear--; }
      renderStats();
      renderCalendar();
    }
    document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
    document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));

    // ============== 启动 ==============
    if (getToken()) {
      showMain();
      initCurrentMonth();
      initDark();
      loadData();
      if (window._refreshTimer) clearInterval(window._refreshTimer);
      window._refreshTimer = setInterval(loadData, 60000);
    } else {
      showAuth();
    }
  </script>
</body>
</html>
